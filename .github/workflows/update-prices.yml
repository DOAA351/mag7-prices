name: Update Mag 7 prices

# Refreshes data.json on a schedule and commits it so GitHub Pages serves
# fresh prices. GitHub's cron is best-effort (often a few minutes late), so
# "every 5 minutes" really means "roughly every 5-10 minutes".
on:
  schedule:
    # Every 5 minutes. Cron is UTC. We run all day; the script just re-reads
    # Yahoo (outside market hours it returns the last close, which is correct).
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

# Allow the workflow to push the updated data.json back to the repo.
permissions:
  contents: write

# If a run is still going when the next one fires, skip rather than pile up.
concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch prices
        run: python fetch_prices.py --once

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No price changes to commit."
          else
            git commit -m "Update prices ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
